services:
  - type: web
    name: nexus-chat
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --timeout 60 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGODB_URI
        sync: false
      - key: MAIL_USERNAME
        value: mamir34310@gmail.com
      - key: MAIL_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: nexus-uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 5
